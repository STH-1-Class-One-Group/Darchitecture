services:
  # 프록시: 서비스의 관문 (포트 80)
  proxy:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./proxy/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - client
      - app-server

  # 앱 서버: 비즈니스 로직 (기존 Worker)
  app-server:
    build: ./app-server
    # 포트를 외부에 노출(3000:3000)하지 않아도 프록시를 통해 접근 가능 (보안상 유리)

  # 클라이언트: 프론트엔드 (기존 Pages)
  client:
    build: ./client