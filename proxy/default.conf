server {
    listen 80;

    # 1. 클라이언트 정적 파일 (Pages 역할)
    location / {
        proxy_pass http://client:80; 
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # 2. 앱 서버 API (Worker 역할)
    # 클라이언트 코드에서 WORKER_URL을 "/api"로 설정하면 됩니다.
    location /api/ {
        proxy_pass http://app-server:3000/; # 마지막에 '/'를 붙이면 /api/hello가 앱서버의 /hello로 전달됨
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        
        # CORS 프리플라이트 대응 (필요 시)
        if ($request_method = 'OPTIONS') {
            add_header 'Access-Control-Allow-Origin' '*';
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS';
            return 204;
        }
    }
}